name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x', '10.0.x']
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies (Library)
        run: npm install
        working-directory: src/Daeha.RnUI

      - name: Install npm dependencies (Demo)
        run: npm install
        working-directory: src/Daeha.RnUI.Demo.Wasm

      - name: Build RnUI Library
        run: dotnet build src/Daeha.RnUI/Daeha.RnUI.csproj -c Release

      - name: Build WASM Demo
        run: dotnet build src/Daeha.RnUI.Demo.Wasm/Daeha.RnUI.Demo.Wasm.csproj -c Release

      - name: Run Tests
        run: dotnet test tests/Daeha.RnUI.Tests/Daeha.RnUI.Tests.csproj -c Release

  nuget-dry-run:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install
        working-directory: src/Daeha.RnUI

      - name: Build
        run: dotnet build src/Daeha.RnUI/Daeha.RnUI.csproj -c Release

      - name: Pack (dry run)
        run: dotnet pack src/Daeha.RnUI/Daeha.RnUI.csproj -c Release --no-build -o ./artifacts

      - name: Verify package
        run: ls -la ./artifacts/*.nupkg
